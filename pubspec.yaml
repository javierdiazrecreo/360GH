name: App360e
description: "Camara 360."
publish_to: 'none'

version: 1.0.0+19

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.6
  path_provider: ^2.1.1
  path: ^1.8.3
  video_player: ^2.8.1
  gal: ^2.2.0
  intl: ^0.18.1
  flutter_inappwebview: ^6.1.5 # Para abrir la ventana de login de Tuya
  http: ^1.1.0                # Para hablar con la nube de Tuya
  shared_preferences: ^2.2.0  # Para recordar el motor seleccionado
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  # Esta es la herramienta que genera los iconos
  flutter_launcher_icons: ^0.13.1

# CONFIGURACIÓN DEL LOGO
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/logo.png"
  # Esto hace que el logo se vea bien en Samsung (Adaptive Icon)
  adaptive_icon_background: "#ffffff" 
  adaptive_icon_foreground: "assets/icon/logo.png"

flutter:
  uses-material-design: true
  # Debes declarar la carpeta de assets para que Flutter la vea
  assets:
    - assets/icon/