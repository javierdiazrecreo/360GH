name: app360e
description: "Control de motor y cámara 360"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  camera: ^0.10.5+5
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Librerías añadidas para las nuevas funciones:
  video_player: ^2.8.1     # Necesario para reproducir el video en la PreviewScreen
  gal: ^2.0.0              # La forma más moderna y simple de guardar en la galería de Android/iOS

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true